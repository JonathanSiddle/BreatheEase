name: Quality Checks

on:
  pull_request:
    branches:
      - main
      - feature/*
      - hotfix/*

jobs:
  CodeQualityChecks:
    runs-on: ubuntu-latest
    env:
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2' 

      - name: Get dependencies
        run: flutter pub get
      
      - name: Write testing env file
        run: echo "LOCAL_STORAGE=TRUE" >> .env

      - name: Run Flutter tests
        run: flutter test

      - name: Check code quality
        run: flutter analyze
